feature: 2026-06-08-external-model-column-impact
created: 2026-06-08

steps:
  - action: "测试骨架：新增 external model 单列类型/长度变化的 failing plan tests"
    exit_signal: "当前实现下测试失败，证明无关字段下游仍被 conservative indirect modified"
    status: done
  - action: "编排骨架：让 external schema-only root 进入既有列级传播 contract"
    exit_signal: "external 单列类型/长度变化只传播到读取该列的 SQL 下游"
    status: done
  - action: "计算节点：补齐 schema-only 判断与 conservative fallback"
    exit_signal: "missing schema、非列级 data change、physical-property 安全边界都保持全下游 fallback"
    status: done
  - action: "边界节点：覆盖新增列、删除列、列顺序、select star、非 projection 使用与多跳 lineage"
    exit_signal: "所有 external 边界场景按 design 验收契约通过"
    status: done
  - action: "回归验证：运行 focused PlanBuilder column-level tests"
    exit_signal: "新增 external tests 与既有 SQL column-level plan tests 全部通过"
    status: done

checks:
  - item: "不修改 ExternalModel.is_sql，也不把 external model 伪装成 SQL model"
    source: 范围守护
    status: passed
  - item: "不新增 raw external_models.yaml 文本 diff、plan-time warehouse schema 查询、用户配置开关或 snapshot migration"
    source: 范围守护
    status: passed
  - item: "PlanBuilder root-impact contract 保持 None | set[str]：None 表示未知/保守全量传播，set[str] 表示列级传播"
    source: 名词契约
    status: passed
  - item: "只有 old/new 都是 ExternalModel、columns_to_types 均存在且能证明 schema-only 时才返回 affected columns"
    source: 名词契约
    status: passed
  - item: "external schema diff 使用已加载 model 的 columns_to_types 与现有 schema changed columns 语义，不直接读取 YAML diff"
    source: 名词契约
    status: passed
  - item: "external branch 位于 SQL-only guard 前；非 external SQL model 路径行为不变"
    source: 编排骨架
    status: passed
  - item: "任何无法证明安全的情况都回退 None，避免 false negative"
    source: 流程级约束
    status: passed
  - item: "External 单列类型变化只 indirect modify 读取该字段的 SQL 下游，无关字段下游不被纳入"
    source: 验收场景
    status: passed
  - item: "External varchar 长度变化只影响读取该字段的 SQL 下游"
    source: 验收场景
    status: passed
  - item: "External 新增列不影响显式读取旧稳定列的下游，但 select * 下游受影响"
    source: 验收场景
    status: passed
  - item: "External 删除列影响读取被删列的下游，不影响无关稳定列消费者"
    source: 验收场景
    status: passed
  - item: "Changed external column 出现在 WHERE/JOIN/GROUP/ORDER 等非 projection 使用时，下游保守受影响"
    source: 验收场景
    status: passed
  - item: "External changed column 通过中间 SQL model 多跳传播到继续读取相关输出列的下游"
    source: 验收场景
    status: passed
  - item: "old 或 new external schema 缺失时保持全下游 fallback"
    source: 验收场景
    status: passed
  - item: "external 非 column data-affecting change 保持全下游 fallback"
    source: 验收场景
    status: passed
  - item: "列顺序变化保守处理，至少 star consumer 受影响；无法表达 star-only 时标记所有列"
    source: 验收场景
    status: passed
  - item: "既有 SQL column-level indirect modification tests 结果不变"
    source: 验收场景
    status: passed
